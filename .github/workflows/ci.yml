name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

env:
  FLUTTER_VERSION_FILE: .fvmrc

jobs:
  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Flutter version
        id: flutter_version
        run: |
          channel=$(jq -r '.flutter' .fvmrc)
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ steps.flutter_version.outputs.channel }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate theme tokens
        run: dart tool/gen_theme.dart

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test
        continue-on-error: true

      - name: Static analysis
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Filter generated files from coverage
        run: |
          lcov --ignore-errors unused --remove coverage/lcov.info \
            'lib/**/*.g.dart' \
            'lib/**/*.freezed.dart' \
            'lib/core/theme/generated/*' \
            'lib/hive_registrar.g.dart' \
            -o coverage/lcov.info

      - name: Compute coverage
        id: coverage
        run: |
          pct=$(awk -F: '
            /^LF:/{lf+=$2}
            /^LH:/{lh+=$2}
            END {
              if (lf == 0) { print "0.00"; exit }
              printf "%.2f", (lh/lf)*100
            }' coverage/lcov.info)
          if [ "$pct" = "0.00" ]; then
            echo "::error::lcov.info has zero lines — coverage computation failed"
            exit 1
          fi
          echo "pct=${pct}" >> "$GITHUB_OUTPUT"
          echo "Line coverage: ${pct}%"

      - name: Enforce coverage ratchet (floor 62%, target 80%)
        run: |
          pct=${{ steps.coverage.outputs.pct }}
          floor=62
          target=80
          # Hard block below floor (prevents regression)
          awk -v p="$pct" -v t="$floor" 'BEGIN { if (p+0 < t+0) exit 1; exit 0 }' \
            || { echo "::error::Coverage ${pct}% below floor ${floor}% — regression detected"; exit 1; }
          # Warn between floor and target (informational)
          awk -v p="$pct" -v t="$target" 'BEGIN { if (p+0 < t+0) exit 1; exit 0 }' \
            && echo "::notice::Coverage ${pct}% meets target ${target}%" \
            || echo "::warning::Coverage ${pct}% below target ${target}% — add tests to raise floor"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 14

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .quality-gates/gitleaks.toml

      - name: SAST (semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
        continue-on-error: true

      - name: Dependency scan (trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
        continue-on-error: true

      - name: File size check
        run: |
          violations=0
          while IFS= read -r f; do
            loc=$(wc -l < "$f")
            if [ "$loc" -gt 200 ]; then
              echo "::warning file=$f::$loc LOC exceeds 200"
              violations=$((violations+1))
            fi
          done < <(find lib -name '*.dart' \
            ! -name '*.g.dart' \
            ! -name '*.freezed.dart' \
            ! -path 'lib/core/theme/generated/*' \
            ! -path 'lib/hive_registrar.g.dart')
          echo "Files exceeding 200 LOC: $violations"

  build:
    name: Build APK (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Read Flutter version
        id: flutter_version
        run: |
          channel=$(jq -r '.flutter' .fvmrc)
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ steps.flutter_version.outputs.channel }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart tool/gen_theme.dart
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
