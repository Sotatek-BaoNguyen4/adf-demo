# ADF Cinema MVP — gitleaks config
# Generated by /quality-gates setup
[extend]
useDefault = true

[[allowlists]]
id = "example-placeholders"
description = "Example and placeholder secret-like strings"
regexes = [
  '''(?i)(example|placeholder|your[_-]?key|changeme|xxx+|test[_-]?key|fake[_-]?secret|dummy)''',
  '''(?i)insert[_-]?(your|the)[_-]?(key|token|secret)''',
]

[[allowlists]]
id = "documentation-paths"
description = "Documentation files with example values"
paths = [
  '''README.*''',
  '''docs/.*''',
  '''.*\.md''',
  '''CHANGELOG.*''',
  '''plans/.*''',
]

[[allowlists]]
id = "test-fixtures"
description = "Test fixtures and asset fixtures (mock data)"
paths = [
  '''test/.*''',
  '''assets/fixtures/.*''',
  '''.*\.(test|spec)\.dart''',
]

[[allowlists]]
id = "dart-env-references"
description = "Dart compile-time env references"
regexes = [
  '''String\.fromEnvironment\(['"][A-Z_][A-Z0-9_]*['"]\)''',
  '''bool\.fromEnvironment\(['"][A-Z_][A-Z0-9_]*['"]\)''',
  '''\$\{[A-Z_][A-Z0-9_]*\}''',
  '''\$[A-Z_][A-Z0-9_]*''',
]
