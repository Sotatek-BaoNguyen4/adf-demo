thresholds:
  coverage: 70
  file_max_loc: 200

gitleaks:
  config_path: .quality-gates/gitleaks.toml

trivy:
  severity: CRITICAL,HIGH
  ignore_unfixed: true

semgrep:
  severity: ERROR
  changed_files_only: true

dast:
  tags:
    - owasp
    - sqli
    - xss
  block_severity: high
  allow_local: false
  endpoints_file: .quality-gates/endpoints.txt

gates:
  secrets:
    enabled: true
  deps:
    enabled: true
  sast:
    enabled: true
  dast:
    enabled: false
  coverage:
    enabled: true
  file-size:
    enabled: true
  sonar:
    enabled: false

