name: adf_demo
description: "ADF Cinema — Home screen MVP."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  cached_network_image: ^3.4.1
  dio: ^5.7.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.4
  go_router: ^14.6.0
  intl: ^0.19.0
  hive_ce: ^2.7.0
  hive_ce_flutter: ^2.0.0
  json_annotation: ^4.9.0
  path_provider: ^2.1.5
  riverpod_annotation: ^2.3.5
  shimmer: ^3.0.0

dev_dependencies:
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  hive_ce_generator: ^1.7.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/fixtures/
    - assets/fonts/

